<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mobi Estimates construction bid review workflow</title>
  <desc id="desc">Original Mobi branded workflow graphic showing four estimating steps: review documents, build scope, price work, review bid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07162f"/>
      <stop offset="0.55" stop-color="#0f2f63"/>
      <stop offset="1" stop-color="#0d6efd"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020817" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1000" cy="120" r="210" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="560" r="190" fill="#50e3c2" opacity="0.10"/>
  <text x="70" y="92" fill="#ffffff" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="34" font-weight="800">Mobi Estimates</text>
  <text x="70" y="168" fill="#ffffff" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="56" font-weight="800">Catch estimating mistakes</text>
  <text x="70" y="225" fill="#d8e6fb" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="30" font-weight="500">before the construction bid goes out</text>
  <g filter="url(#shadow)">
    <rect x="70" y="310" rx="28" ry="28" width="250" height="160" fill="#ffffff"/>
    <rect x="350" y="310" rx="28" ry="28" width="250" height="160" fill="#ffffff"/>
    <rect x="630" y="310" rx="28" ry="28" width="250" height="160" fill="#ffffff"/>
    <rect x="910" y="310" rx="28" ry="28" width="220" height="160" fill="#ffffff"/>
  </g>
  <g font-family="Plus Jakarta Sans, Arial, sans-serif">
    <text x="100" y="360" fill="#0d6efd" font-size="24" font-weight="800">01</text>
    <text x="100" y="405" fill="#07162f" font-size="27" font-weight="800">Review</text>
    <text x="100" y="440" fill="#344159" font-size="22">documents</text>
    <text x="380" y="360" fill="#0d6efd" font-size="24" font-weight="800">02</text>
    <text x="380" y="405" fill="#07162f" font-size="27" font-weight="800">Build</text>
    <text x="380" y="440" fill="#344159" font-size="22">scope</text>
    <text x="660" y="360" fill="#0d6efd" font-size="24" font-weight="800">03</text>
    <text x="660" y="405" fill="#07162f" font-size="27" font-weight="800">Price</text>
    <text x="660" y="440" fill="#344159" font-size="22">work</text>
    <text x="940" y="360" fill="#0d6efd" font-size="24" font-weight="800">04</text>
    <text x="940" y="405" fill="#07162f" font-size="27" font-weight="800">Review</text>
    <text x="940" y="440" fill="#344159" font-size="22">bid</text>
  </g>
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8">
    <path d="M320 390 H350"/><path d="M600 390 H630"/><path d="M880 390 H910"/>
  </g>
  <text x="70" y="552" fill="#d8e6fb" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="24">Scope • Labor • Overhead • Margin • Cash flow</text>
</svg>
